<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" role="img" aria-label="건강신호등 대장내시경 전 음식 확인 공유 이미지">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f8fbff"/>
      <stop offset="100%" stop-color="#eef4fb"/>
    </linearGradient>
    <linearGradient id="card" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#f8fbff"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="16" stdDeviation="22" flood-color="#dbe7f6" flood-opacity="0.75"/>
    </filter>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>

  <circle cx="156" cy="98" r="92" fill="#dbeafe" opacity="0.55"/>
  <circle cx="1068" cy="548" r="104" fill="#dcfce7" opacity="0.5"/>
  <circle cx="1144" cy="120" r="64" fill="#fee2e2" opacity="0.55"/>

  <rect x="72" y="64" width="1056" height="502" rx="40" fill="url(#card)" stroke="#d8e2ee" stroke-width="2" filter="url(#shadow)"/>

  <text x="128" y="138" fill="#2f6fed" font-size="28" font-family="Pretendard, Apple SD Gothic Neo, sans-serif" font-weight="700" letter-spacing="0.02em">
    건강신호등
  </text>

  <text x="128" y="274" fill="#10243e" font-size="82" font-family="Pretendard, Apple SD Gothic Neo, sans-serif" font-weight="800">
    <tspan x="128" dy="0">대장내시경 전에</tspan>
    <tspan x="128" dy="96">먹어도 될까?</tspan>
  </text>

  <text x="128" y="456" fill="#475467" font-size="34" font-family="Pretendard, Apple SD Gothic Neo, sans-serif" font-weight="500">
    <tspan x="128" dy="0">음식명을 검색하면</tspan>
    <tspan x="128" dy="52">허용 · 주의 · 피해야 할지 바로 확인</tspan>
  </text>

  <g transform="translate(860 138)">
    <rect width="184" height="324" rx="92" fill="#0f172a"/>
    <circle cx="92" cy="78" r="42" fill="#16a34a"/>
    <circle cx="92" cy="162" r="42" fill="#f59e0b"/>
    <circle cx="92" cy="246" r="42" fill="#dc2626"/>
    <rect x="36" y="34" width="112" height="256" rx="56" fill="none" stroke="#1e293b" stroke-width="2"/>
  </g>

  <g transform="translate(760 472)">
    <rect width="220" height="54" rx="27" fill="#eff6ff" stroke="#dbeafe"/>
    <circle cx="34" cy="27" r="10" fill="#2f6fed"/>
    <text x="58" y="35" fill="#1f2937" font-size="24" font-family="Pretendard, Apple SD Gothic Neo, sans-serif" font-weight="700">
      음식 바로 확인
    </text>
  </g>
</svg>
